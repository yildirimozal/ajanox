name: Publish to PyPI

# GitHub Release yayınlandığında (tag: v1.0.0 gibi) tetiklenir.
# OIDC "trusted publishing" kullanır — repo'da PyPI token saklanmaz.
#
# Tek seferlik PyPI kurulumu (pypi.org → proje → Settings → Publishing):
#   Owner:        yildirimozal
#   Repository:   ajanox
#   Workflow:     publish.yml
#   Environment:  pypi
# Ayrıca GitHub'da 'pypi' adında bir Environment oluştur (Settings → Environments).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev,signing]"
      - name: Lint (ruff)
        run: ruff check src/ tests/
      - name: Test (pytest)
        run: pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Tag/sürüm tutarlılık kontrolü
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject: $PKG_VERSION, tag: $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag ($TAG) ile pyproject sürümü ($PKG_VERSION) uyuşmuyor."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC trusted publishing için zorunlu
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
