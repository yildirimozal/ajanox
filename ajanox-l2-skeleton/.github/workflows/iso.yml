# ISO build pipeline (v2.1+)
#
# DURUM: placeholder. v2.0'da Cubic ile manuel ISO build var.
# Bu workflow v2.1'de live-build ile aktif olacak.
#
# Tetikleyiciler:
#   - main'e push → daily nightly ISO
#   - release tag (v2.x.x) → stable ISO + GitHub Release
#   - manual dispatch → debugging

name: ISO build

on:
  push:
    branches: [main]
    paths:
      - 'iso/live-build/**'
      - 'apt/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt update
          sudo apt install -y live-build squashfs-tools xorriso

      - name: Build ISO
        working-directory: iso/live-build
        run: |
          sudo lb config \
            --distribution noble \
            --architecture amd64 \
            --linux-flavours generic
          sudo lb build

      - name: Smoke test in QEMU
        run: |
          sudo apt install -y qemu-system-x86 qemu-kvm
          pip install pytest paramiko
          pytest tests/iso-acceptance/ \
            --iso=iso/live-build/*.hybrid.iso

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ajanox-iso-${{ github.sha }}
          path: iso/live-build/*.hybrid.iso
          retention-days: 7

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: iso/live-build/*.hybrid.iso
