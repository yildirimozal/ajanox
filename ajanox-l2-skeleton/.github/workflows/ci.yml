# Genel CI (lint, test, integration smoke)
#
# Ağır ISO build için iso.yml'a bak — bu workflow hızlı (<5 dk) olmalı.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * *'  # daily — L3 stable ile uyum kontrolü

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML
        run: |
          pip install yamllint
          yamllint .github/

      - name: Lint shell scripts
        run: |
          sudo apt install -y shellcheck
          find . -name "*.sh" -exec shellcheck {} +

  firstrun-test:
    runs-on: ubuntu-24.04
    if: hashFiles('firstrun/pyproject.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: |
          cd firstrun
          pip install -e '.[dev]'
          pytest

  gnome-extension-build:
    runs-on: ubuntu-24.04
    if: hashFiles('gnome-extension/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: |
          cd gnome-extension
          npm ci
          npm run build
          npm run pack

  integration-smoke:
    # Daily: L3 ajanox stable + L2 config birlikte çalışıyor mu
    runs-on: ubuntu-24.04
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install --upgrade ajanox
          ajanox --version
          # TODO: marketplace ve sistem skill'leri ile smoke test
